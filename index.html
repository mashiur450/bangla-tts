<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>বাংলা টেক্সট টু স্পিচ</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      background: #0f0c29;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 40px 36px;
      width: 100%;
      max-width: 620px;
      color: #fff;
    }
    .logo { text-align: center; margin-bottom: 28px; }
    .logo h1 { font-size: 26px; font-weight: 700; }
    .logo p { font-size: 13px; color: rgba(255,255,255,0.6); margin-top: 4px; }
    label { display: block; font-size: 14px; color: rgba(255,255,255,0.75); margin-bottom: 8px; }
    select {
      width: 100%; padding: 12px 16px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px; color: #fff;
      font-size: 15px; margin-bottom: 20px; outline: none;
    }
    select option { background: #1a1a2e; }
    textarea {
      width: 100%; height: 160px;
      padding: 14px 16px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 12px; color: #fff;
      font-size: 15px; line-height: 1.7;
      resize: vertical; outline: none; font-family: inherit;
    }
    textarea::placeholder { color: rgba(255,255,255,0.35); }
    .char-count { text-align: right; font-size: 12px; color: rgba(255,255,255,0.45); margin-top: 6px; margin-bottom: 20px; }
    .btn-generate {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border: none; border-radius: 12px; color: #fff;
      font-size: 16px; font-weight: 600; cursor: pointer;
    }
    .btn-generate:disabled { opacity: 0.5; cursor: not-allowed; }
    .loading { display: none; text-align: center; margin-top: 20px; color: rgba(255,255,255,0.7); }
    .spinner {
      display: inline-block; width: 20px; height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 8px; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .audio-box {
      display: none; margin-top: 24px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 14px; padding: 20px;
    }
    .audio-box p { font-size: 13px; color: rgba(255,255,255,0.6); margin-bottom: 12px; }
    audio { width: 100%; margin-bottom: 14px; }
    .btn-download {
      display: block; width: 100%; padding: 11px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 10px; color: #fff;
      font-size: 14px; font-weight: 600;
      text-align: center; cursor: pointer; text-decoration: none;
    }
    .error-box {
      display: none; margin-top: 16px; padding: 12px 16px;
      background: rgba(255,80,80,0.15);
      border: 1px solid rgba(255,80,80,0.3);
      border-radius: 10px; color: #ffaaaa; font-size: 13px;
    }
    .footer { text-align: center; margin-top: 28px; font-size: 12px; color: rgba(255,255,255,0.3); }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>🎙️ বাংলা TTS</h1>
      <p>টেক্সট লিখুন, অডিও শুনুন</p>
    </div>
    <label>ভয়েস সিলেক্ট করুন</label>
    <select id="voiceSelect">
      <option value="25af00d9a9c043a2a628c741d9eb62f9">🎤 MASHIUR (বাংলা পুরুষ)</option>
    </select>
    <label>বাংলা টেক্সট লিখুন</label>
    <textarea id="textInput" placeholder="এখানে বাংলায় লিখুন..."></textarea>
    <div class="char-count"><span id="charCount">0</span> অক্ষর</div>
    <button class="btn-generate" id="generateBtn" onclick="generateAudio()">🔊 অডিও তৈরি করুন</button>
    <div class="loading" id="loading"><span class="spinner"></span> অডিও তৈরি হচ্ছে...</div>
    <div class="error-box" id="errorBox"></div>
    <div class="audio-box" id="audioBox">
      <p>✅ অডিও তৈরি হয়েছে</p>
      <audio id="audioPlayer" controls></audio>
      <a class="btn-download" id="downloadBtn" download="audio.mp3">⬇️ ডাউনলোড করুন</a>
    </div>
    <div class="footer">Powered by Fish Audio</div>
  </div>
  <script>
    const API_KEY = 'a16a38e123474491931b29baea1e99ab';

    document.getElementById('textInput').addEventListener('input', function() {
      document.getElementById('charCount').textContent = this.value.length;
    });

    async function generateAudio() {
      const text = document.getElementById('textInput').value.trim();
      const voiceId = document.getElementById('voiceSelect').value;
      if (!text) { showError('অনুগ্রহ করে কিছু লিখুন।'); return; }

      const btn = document.getElementById('generateBtn');
      const loading = document.getElementById('loading');
      const audioBox = document.getElementById('audioBox');
      const errorBox = document.getElementById('errorBox');

      btn.disabled = true;
      loading.style.display = 'block';
      audioBox.style.display = 'none';
      errorBox.style.display = 'none';

      try {
        const response = await fetch('https://tts-proxy.haqqbangla.workers.dev', {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${API_KEY}`,
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            text: text,
            chunk_length: 200,
            format: 'mp3',
            mp3_bitrate: 128,
            references: [],
            reference_id: voiceId,
            normalize: true,
            latency: 'normal',
          }),
        });

        if (!response.ok) throw new Error('এরর: ' + response.status);
        const blob = await response.blob();
        const url = URL.createObjectURL(blob);
        document.getElementById('audioPlayer').src = url;
        document.getElementById('downloadBtn').href = url;
        audioBox.style.display = 'block';

      } catch (err) {
        showError('এরর হয়েছে: ' + err.message);
      } finally {
        btn.disabled = false;
        loading.style.display = 'none';
      }
    }

    function showError(msg) {
      const box = document.getElementById('errorBox');
      box.textContent = msg;
      box.style.display = 'block';
    }
  </script>
</body>
</html>
